<!DOCTYPE html>
<html>
<head>
    <title>Dodaj aktywo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card shadow p-4">
        <h2>Dodaj nową walutę do portfela</h2>
        <form method="post" class="mt-4">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-3">
                <button type="submit" class="btn btn-success">Zapisz aktywo</button>
                <a href="{% url 'portfolio_list' %}" class="btn btn-secondary">Powrót</a>
            </div>
        </form>
    </div>
</body>
</html>
