services:
  - type: web
    name: finance-aggregator
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finance-cache
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False

databases:
  - name: finance-db
    plan: free

redis:
  - name: finance-cache
    plan: free
    ipAllowList: []