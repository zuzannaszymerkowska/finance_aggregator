services:
  # Aplikacja Django
  - type: web
    name: finance-aggregator
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: finance-cache
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

  # Redis jako usługa typu keyvalue
  - type: keyvalue
    name: finance-cache
    plan: free

databases:
  - name: finance-db
    plan: free